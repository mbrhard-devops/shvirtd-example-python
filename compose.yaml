# Подключаем compose файл
# proxy.yaml с настройками HAProxy и Nginx
include:
  - proxy.yaml

services:

  # Service 1: Python-приложение
  web:
    # Настройки сборки Docker-образа
    build:
      # Путь к контексту сборки
      context: .
      # Файл Dockerfile для сборки
      dockerfile: Dockerfile.python

    # Имя контейнера в системе
    container_name: fastapi-app

    # Порт 8090 будет через proxy.yaml (nginx/haproxy)
    expose:
      - "5000"

    # ${VAR} - подстановка из файла .env
    environment:
      - DB_HOST=db                       # Имя сервиса БД (было 'mysql')
      - DB_USER=${MYSQL_USER}            # Из .env файла
      - DB_PASSWORD=${MYSQL_PASSWORD}    # Из .env файла
      - DB_NAME=${MYSQL_DATABASE}        # Из .env файла

    # Зависимости: ждать запуска БД перед стартом
    depends_on:
      db:
        # Ждать успешной проверки здоровья (healthcheck)
        condition: service_healthy

    # сеть backend с фиксированным IP
    networks:
      backend:
        ipv4_address: 172.20.0.5

    # always - перезапускать всегда, даже при ручном останове
    restart: always

  # Service 2: База данных MySQL
  db:
    # Готовый образ из Docker Hub
    image: mysql:8.0

    # Имя контейнера в системе
    container_name: mysql-db

    # ENV-переменные из .env файла
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}

    # Тома: сохранение данных вне контейнера
    volumes:
      - mysql-data:/var/lib/mysql

    # сеть backend с фиксированным IP
    networks:
      backend:
        ipv4_address: 172.20.0.10

    # Проверка здоровья сервиса (нужна для depends_on)
    healthcheck:
      # Команда для проверки (mysqladmin ping)
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      # Интервал между проверками
      interval: 10s
      # Таймаут одной проверки
      timeout: 5s
      # Количество попыток перед пометкой "unhealthy"
      retries: 5
      # Время на старт перед началом проверок
      start_period: 30s

    # Политика перезапуска
    restart: always

# ОБЪЯВЛЕНИЕ СЕТЕЙ
networks:
  backend:
    # Драйвер: мост (контейнеры видят друг друга по именам)
    driver: bridge
    # фиксированные IP контейнерам
    ipam:
      config:
        # Подсеть для всех контейнеров в этой сети
        - subnet: 172.20.0.0/24

# ОБЪЯВЛЕНИЕ ТОМОВ
volumes:
  # Имя тома для MySQL (Docker создаст его автоматически)
  mysql-data:
